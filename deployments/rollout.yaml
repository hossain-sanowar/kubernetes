kubectl get all
kubectl get deployments
kubectl create -f deployment-definition.yaml

kubectl rollout status deployment/myapp-deployment # deployment is created and existing deployment is updated

kubectl rollout history deployment/myapp-deployment 

kubectl delete deployment myapp-deployment
kubectl get all # no longer seen; all are terminated

# change image version
kubectl create -f deployment-definition.yaml --record # here record is used for hostory
kubectl rollout status deployment/myapp-deployment
kubectl rollout history deployment/myapp-deployment

# change image
kubectl set image deployment/myapp-deployment nginx-container=nginx:1.12-perl

kubectl get deployment
kubectl describe deployment
kubectl set image deploy frontend simple-webapp=kodekloud/webapp-color:v2 # or below one
kubectl edit deployment frontend


kubectl rollout status deployment/myapp-deployment
kubectl rollout history deployment/myapp-deployment

kubectl describe deploymnets

# if we find problem of last version, then will rollback
kubectl rollout undo deployment/myapp-deployment
kubectl rollout history deployment/myapp-deployment