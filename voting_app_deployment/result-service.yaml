apiVersion: v1
kind: Service
metadata:
  name: result
  labels:
    app: result

spec:
  type: NodePort # for external communication; we need to use NodePort or Loadbalancer
  ports:
  - name: "result-service"
    port: 8081 # we can give an port
    targetPort: 80 # this shouldn be result-app-pod port
    nodePort: 31001
  selector:
    app: result # this should be voting-app-pod labels
