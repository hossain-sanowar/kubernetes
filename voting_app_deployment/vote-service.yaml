apiVersion: v1
kind: Service
metadata:
  name: vote
  labels:
    app: vote

spec:
  type: NodePort # for external communication; we need to use NodePort or Loadbalancer
  ports:
  - name: "vote-service"
    port: 8080
    targetPort: 80 # this shouldn be voting-app-pod port
    nodePort: 31000
  selector:
    app: vote # this should be voting-app-pod labels
