apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  labels:
    app: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      name: worker
      labels:
        app: worker

    spec:
      containers:
        - name: worker
          image: dockersamples/examplevotingapp_vote
          # ports: # we don't need the service port because worker has no service
          #   - containerPort: 80
          #     name: vote