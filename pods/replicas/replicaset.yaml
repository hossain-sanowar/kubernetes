apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: myapp-replicaset
  labels:
    app: myapp
    type: front-end

spec:
  template:
    metadata:
      name: myapp-pod
      labels:
        app: myapp
    spec:
      containers:
        - name: nginx-container
          image: nginx
  replicas: 6
  selector:
    matchLabels:
      type: front-end

kubectl apply -f replicaset.yaml

kubectl scale --replicas=6 replicaset.yaml
kubectl scale --replicas=6 replicaset myapp-replicaset
kubectl scale replicaset <name> --replicaset=2